<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
        <h2>Dashboard</h2>
        <button class="toggle-btn" id="sidebarToggle" title="Collapse sidebar"></button>
        </div>
        <div class="sidebar-content">
            <label">Month</label>
            <select name="" id="monthSelect">
                <option value="0">Januatry</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
            </select>
            <label>Year</label>
            <select name="" id="yearSelect">
                <option value="2025">2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="projects">Projects</button>
                <button class="nav-tab" data-tab="employeers">Employeers</button>
            </div>
            <button class="seed-btn" id="seedBtn">Seed Data</button>
            </div>
    </aside>        
            <button class="sidebar-open-btn hidden" id="sidebarOpenBtn" title="Open sidebar">   </button>
            <main class="main-content">
                <div class="top-bar">
                    <h1 id="viewTitle">Projects</h1>
                    <span class="period-info" id="periodInfo"></span>
                    <button class="add-btn" id="addBtn">+ Add Project</button>
                </div>
                <div class="filter-chips" id="filterChips"></div>
                <div class="table-container" id="tableContainer"></div>
            </main>
            <div class="slide-panel hidden" id="slidePanel">
                <div class="slide-panel-header">
                    <h3 id="slidePanelTitle">Add New</h3>
                    <button class="close-panel" id="closeSlidePanel"></button>
                </div>
                <div class="slide-panel-body" id="slidePanelBody"></div>
            </div>
            <div class="overlay hidden" id="overlay"></div>
            <div id="modalContainer"></div>
            <div id="actionMenuContainer"></div>
            <div id="filterPopupContainer"></div>
            <script src="script.js"></script>
</body>
</html>
